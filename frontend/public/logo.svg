<svg width="192" height="192" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shield gradient -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Trend line gradient -->
    <linearGradient id="trendGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Modern rounded shield -->
  <path
    d="M100 20 
       C140 35 165 55 165 55 
       V110 
       C165 155 125 175 100 185 
       C75 175 35 155 35 110 
       V55 
       C35 55 60 35 100 20Z"
    fill="url(#shieldGradient)"
  />

  <!-- Upward monitoring trend -->
  <g stroke="url(#trendGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <line x1="75" y1="120" x2="100" y2="100" />
    <line x1="100" y1="100" x2="125" y2="80" />
  </g>

  <!-- Data points -->
  <circle cx="75" cy="120" r="5" fill="url(#trendGradient)" />
  <circle cx="100" cy="100" r="5" fill="url(#trendGradient)" />
  <circle cx="125" cy="80" r="5" fill="url(#trendGradient)" />

  <!-- Alert indicator (top-right) -->
  <circle cx="150" cy="55" r="7" fill="#ef4444" stroke="white" stroke-width="2"/>
</svg>